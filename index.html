<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JONIJU POS System</title>
    <style>
        :root {
            --bg: #f7f5f5;
            --card: #2d2d2d;
            --text: #ffffff;
            --accent: #4CAF50;
            --danger: #e74c3c;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        
        /* Layout */
        .menu-section { flex: 2; padding: 20px; overflow-y: auto; border-right: 2px solid #333; }
        .cart-section { flex: 1; padding: 20px; display: flex; flex-direction: column; background: var(--card); }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .item-card { background: #3d3d3d; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.2s; border: 1px solid #555; }
        .item-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .price { color: var(--accent); font-weight: bold; display: block; margin-top: 5px; }

        /* Cart */
        .cart-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #444; }
        .total-area { font-size: 1.5rem; padding: 20px 0; border-top: 2px solid var(--accent); margin-top: 10px; }

        /* Buttons */
        button { width: 100%; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-pay { background: var(--accent); color: white; font-size: 1.1rem; }
        .btn-export { background: #3498db; color: white; }
        .btn-clear { background: var(--danger); color: white; margin-top: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="menu-section">
        <h2>Menu Items</h2>
        <div class="grid" id="menu-grid">
            </div>
    </div>

    <div class="cart-section">
        <h2>Current Order</h2>
        <div class="cart-list" id="cart-items"></div>
        <div class="total-area">
            Total: ₱<span id="total-amount">0</span>
        </div>
        <button class="btn-pay" onclick="completeSale()">Complete Sale (Offline)</button>
        <button class="btn-export" onclick="exportToCSV()">Export Sales to Sheets (CSV)</button>
        <button class="btn-clear" onclick="clearSales()">Clear Sales History</button>
    </div>

    <script>
        // 1. Initial Data (You can add more here)
        const menu = [
            { id: 1, name: "Nachos with Salsa", price: 50 },
            { id: 2, name: "Quesadillas", price: 60 },
            { id: 3, name: "Brewed Coffee", price: 40 },
            { id: 4, name: "Iced Latte", price: 75 }
        ];

        let cart = [];
        let salesHistory = JSON.parse(localStorage.getItem('cafe_sales')) || [];

        // 2. Render Menu
        const menuGrid = document.getElementById('menu-grid');
        menu.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `${item.name} <span class="price">₱${item.price}</span>`;
            card.onclick = () => addToCart(item);
            menuGrid.appendChild(card);
        });

        // 3. Cart Logic
        function addToCart(item) {
            cart.push(item);
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('total-amount');
            container.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="cart-item">
                        <span>${item.name}</span>
                        <span>₱${item.price}</span>
                    </div>`;
            });
            totalDisplay.innerText = total;
        }

        // 4. Complete Sale & Save to LocalStorage
        function completeSale() {
            if (cart.length === 0) return alert("Cart is empty!");

            const sale = {
                timestamp: new Date().toLocaleString(),
                items: cart.map(i => i.name).join(", "),
                total: cart.reduce((sum, i) => sum + i.price, 0)
            };

            salesHistory.push(sale);
            localStorage.setItem('cafe_sales', JSON.stringify(salesHistory));
            
            cart = [];
            renderCart();
            alert("Sale Saved Locally!");
        }

        // 5. Export to CSV (For Google Sheets)
        function exportToCSV() {
            if (salesHistory.length === 0) return alert("No sales to export!");

            let csvContent = "data:text/csv;charset=utf-8,Date/Time,Items,Total\n";
            salesHistory.forEach(row => {
                csvContent += `${row.timestamp},"${row.items}",${row.total}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `cafe_sales_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
        }

        function clearSales() {
            if(confirm("Are you sure? This deletes all local history.")) {
                localStorage.removeItem('cafe_sales');
                salesHistory = [];
                alert("History Cleared.");
            }
        }
    </script>
</body>
</html>
